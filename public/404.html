<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/webp" href="favicon_light.webp" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/webp" href="favicon_dark.webp" media="(prefers-color-scheme: dark)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - ThrustVault</title>
    <meta name="description" content="The page you are looking for does not exist on ThrustVault. Return to safety or request access to the propulsion database."/>
    <meta name="robots" content="noindex, follow"/>
    <link rel="canonical" href="https://thrustvault.reude.tech/404"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script src="/libs/lucide.min.js"></script>
    <style>
        :root {
            --bg-base: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: rgba(226, 232, 240, 0.8);
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --shadow-lg: 0 12px 28px -5px rgba(0,0,0,0.04), 0 8px 16px -6px rgba(0,0,0,0.02);
            --radius-lg: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Decorative background shapes */
        .decor-blur-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.08);
            filter: blur(80px);
            top: 10%;
            left: 10%;
            z-index: 1;
        }

        .decor-blur-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.08);
            filter: blur(100px);
            bottom: 10%;
            right: 10%;
            z-index: 1;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 480px;
            width: 100%;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 24px;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-home:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-home:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="decor-blur-1"></div>
    <div class="decor-blur-2"></div>

    <div class="error-card">
        <div class="icon-container">
            <i data-lucide="shield-alert" style="width: 40px; height: 40px;"></i>
        </div>
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, is temporarily unavailable, or you do not have sufficient permissions to access it.</p>
        <a href="/" class="btn-home">
            <i data-lucide="home" style="width: 18px; height: 18px;"></i>
            Back to Safety
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
