<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon_light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="favicon_dark.png" media="(prefers-color-scheme: dark)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ThrustVault</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="libs/lucide.min.js" onerror="this.onerror=null; this.src='https://unpkg.com/lucide@latest';"></script>
    <!-- Supabase JS Client -->
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css?v=1.6">
    <!-- Page Loader Transition Script -->
    <script src="page-loader.js?v=2.2"></script>

<style id="admin-layout-override">
    /* ================================================================
       ADMIN PORTAL LAYOUT OVERRIDE — Horizontal Topbar Navigation
       The sidebar renders as a full-width horizontal topbar, not a
       280px left panel. app-container stacks vertically.
    ================================================================ */
    .app-container {
        flex-direction: column !important;
        height: 100vh !important;
        overflow: hidden !important;
    }
    .sidebar {
        width: 100% !important;
        height: auto !important;
        min-height: 60px !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border-color) !important;
        flex-direction: row !important;
        align-items: center !important;
        padding: 0 24px !important;
        background-color: rgba(255,255,255,0.95) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        box-shadow: 0 1px 4px rgba(15,23,42,0.06) !important;
        gap: 0 !important;
        flex-shrink: 0 !important;
        z-index: 100 !important;
        position: relative !important;
        box-sizing: border-box !important;
    }
    [data-theme=dark] .sidebar {
        background-color: rgba(15,23,42,0.95) !important;
        border-bottom-color: rgba(255,255,255,0.07) !important;
    }
    .sidebar .sidebar-skeleton-wrapper {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 16px !important;
        width: 100% !important;
        padding: 0 !important;
        height: 60px !important;
    }
    .main-content-wrapper {
        flex: 1 !important;
        min-height: 0 !important;
        display: flex !important;
        flex-direction: column !important;
    }
    .main-content {
        flex: 1 !important;
        min-height: 0 !important;
    }
    /* Nav link styles for horizontal bar */
    .sidebar .btn-sidebar-link {
        padding: 8px 14px !important;
        border-radius: var(--radius-md) !important;
        font-size: 0.875rem !important;
        font-weight: 500 !important;
        color: var(--text-secondary) !important;
        white-space: nowrap !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        transition: all 0.18s ease !important;
        text-decoration: none !important;
        background: transparent !important;
        border: none !important;
        cursor: pointer !important;
    }
    .sidebar .btn-sidebar-link:hover,
    .sidebar .btn-sidebar-link.active {
        background: rgba(37,99,235,0.08) !important;
        color: var(--primary-color) !important;
    }
    /* Dropdown items in horizontal nav */
    .sidebar .sidebar-dropdown-wrapper .category-list {
        display: none !important;
        position: absolute !important;
        top: calc(100% + 4px) !important;
        left: 0 !important;
        min-width: 200px !important;
        background: var(--bg-panel-solid) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius-md) !important;
        box-shadow: 0 8px 24px -4px rgba(15,23,42,0.12) !important;
        z-index: 9999 !important;
        padding: 6px !important;
        flex-direction: column !important;
        gap: 2px !important;
    }
    .sidebar .sidebar-dropdown-wrapper.expanded .category-list {
        display: flex !important;
    }
    .sidebar .sidebar-dropdown-wrapper .category-list .btn-sidebar-link {
        width: 100% !important;
        text-align: left !important;
        justify-content: flex-start !important;
        padding: 9px 14px !important;
    }
    /* User profile dropdown */
    .user-profile-menu-wrapper {
        position: relative !important;
        display: flex !important;
        align-items: center !important;
        margin-left: auto !important;
    }
    .user-avatar-trigger {
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
        cursor: pointer !important;
        padding: 4px 8px !important;
        border-radius: var(--radius-md) !important;
        transition: background 0.15s ease !important;
    }
    .user-avatar-trigger:hover { background: rgba(37,99,235,0.06) !important; }
    .user-dropdown-card {
        display: none !important;
        position: absolute !important;
        top: calc(100% + 8px) !important;
        right: 0 !important;
        min-width: 220px !important;
        background: var(--bg-panel-solid) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius-md) !important;
        box-shadow: 0 8px 24px -4px rgba(15,23,42,0.12) !important;
        z-index: 9999 !important;
        padding: 12px !important;
        flex-direction: column !important;
        gap: 10px !important;
    }
    .user-profile-menu-wrapper.open .user-dropdown-card { display: flex !important; }
    .dropdown-user-details { display: flex !important; flex-direction: column !important; gap: 4px !important; }
    .badge-role { font-size: 0.72rem !important; font-weight: 700 !important; padding: 2px 8px !important; border-radius: var(--radius-full) !important; display: inline-block !important; width: fit-content !important; }
    .role-admin { background: #dbeafe; color: #1d4ed8 !important; }
    .dropdown-divider { height: 1px; background: var(--border-color); margin: 4px 0; }
    .sidebar .sidebar-footer {
        border-top: none !important;
        background: transparent !important;
        padding: 0 !important;
        gap: 0 !important;
    }
    .avatar-chevron { width: 14px !important; height: 14px !important; color: var(--text-secondary) !important; transition: transform 0.2s ease !important; }
    .user-profile-menu-wrapper.open .avatar-chevron { transform: rotate(180deg) !important; }
    .sidebar .btn-logout-premium { width: 100% !important; padding: 8px 14px !important; font-size: 0.82rem !important; margin-top: 8px !important; }
    /* Sidebar nav dropdown wrappers need relative position for dropdown to work */
    .sidebar .sidebar-nav { overflow: visible !important; flex: none !important; }

</style>
</head>
<body class="login-body">
    <!-- Ambient Blur Background Blobs -->
    <div class="login-bg-blob blob-1"></div>
    <div class="login-bg-blob blob-2"></div>

    <div class="login-container">
        <!-- Brand Logo/Header on top (outside the card or inside) -->
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <div class="login-logo-circle">
                        <i data-lucide="aperture" class="spin-slow" style="width:30px; height:30px; color:#2563eb;"></i>
                    </div>
                </div>
                <h2 id="login-card-title">Welcome to <span>ThrustVault</span></h2>
                <p id="login-card-subtitle">Sign in to access the UAV motor database console.</p>
            </div>
            
            <!-- View 1: Sign In -->
            <div id="view-signin" class="login-view active">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-with-icon">
                            <input type="email" id="login-email" required placeholder="e.g. name@thrustvault.com">
                            <i data-lucide="mail"></i>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 18px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label for="login-password">Password</label>
                            <a href="#" id="link-goto-forgot" style="font-size:0.75rem; color:#2563eb; text-decoration:none; font-weight:500;">Forgot Password?</a>
                        </div>
                        <div class="input-with-icon" style="margin-top: 6px;">
                            <input type="password" id="login-password" class="with-toggle" required placeholder="••••••••">
                            <i data-lucide="lock"></i>
                            <button type="button" class="btn-password-toggle" data-target="login-password" title="Toggle Password Visibility">
                                <i data-lucide="eye" style="position:static; color:inherit; pointer-events:none; width:16px; height:16px;"></i>
                            </button>
                        </div>
                        <div class="caps-lock-warning" id="caps-warning-login-password">
                            <i data-lucide="alert-triangle" style="width:14px; height:14px; color:#e11d48; position:static; pointer-events:none;"></i> Caps Lock is ON
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn" style="margin-top: 28px; width: 100%;">
                        Sign In <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                    </button>
                </form>
            </div>


            <!-- View 2: Forgot Password - Request OTP -->
            <div id="view-forgot-email" class="login-view" style="display: none;">
                <form id="forgot-email-form">
                    <div class="form-group">
                        <label for="forgot-email">Email Address</label>
                        <div class="input-with-icon">
                            <input type="email" id="forgot-email" required placeholder="e.g. name@thrustvault.com">
                            <i data-lucide="mail"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn" style="margin-top: 24px; width: 100%;">
                        Send Verification Code <i data-lucide="send" style="width: 16px; height: 16px;"></i>
                    </button>
                    
                    <div style="text-align: center; margin-top: 18px;">
                        <a href="#" class="link-back-to-login" style="font-size:0.8rem; color:#64748b; text-decoration:none; font-weight:500; display:inline-flex; align-items:center; gap:4px;"><i data-lucide="arrow-left" style="width:14px; height:14px;"></i> Back to Sign In</a>
                    </div>
                </form>
            </div>

            <!-- View 3: Forgot Password - Verify OTP -->
            <div id="view-forgot-otp" class="login-view" style="display: none;">
                <form id="forgot-otp-form">
                    <div class="form-group">
                        <label for="forgot-otp">Verification Code (OTP)</label>
                        <div class="input-with-icon">
                            <input type="text" id="forgot-otp" required maxlength="6" placeholder="Enter 6-digit code" style="text-align: center; letter-spacing: 4px; font-weight: 700; font-size: 1.1rem;">
                            <i data-lucide="shield-check"></i>
                        </div>
                        <p style="font-size:0.75rem; color:#64748b; margin-top:6px; text-align:center;">Enter the 6-digit verification code sent to your email.</p>
                    </div>
                    
                    <button type="submit" class="login-btn" style="margin-top: 24px; width: 100%;">
                        Verify Code <i data-lucide="check-circle" style="width: 16px; height: 16px;"></i>
                    </button>
                    
                    <div style="display:flex; justify-content:space-between; margin-top:18px;">
                        <a href="#" id="link-resend-otp" style="font-size:0.8rem; color:#2563eb; text-decoration:none; font-weight:500;">Resend Code</a>
                        <a href="#" class="link-back-to-login" style="font-size:0.8rem; color:#64748b; text-decoration:none; font-weight:500; display:inline-flex; align-items:center; gap:4px;"><i data-lucide="arrow-left" style="width:14px; height:14px;"></i> Cancel</a>
                    </div>
                </form>
            </div>

            <!-- View 4: Reset Password - Update Password -->
            <div id="view-forgot-reset" class="login-view" style="display: none;">
                <form id="forgot-reset-form">
                    <div class="form-group">
                        <label for="reset-password">New Password</label>
                        <div class="input-with-icon">
                            <input type="password" id="reset-password" class="with-toggle" required placeholder="Min 6 characters">
                            <i data-lucide="lock"></i>
                            <button type="button" class="btn-password-toggle" data-target="reset-password" title="Toggle Password Visibility">
                                <i data-lucide="eye" style="position:static; color:inherit; pointer-events:none; width:16px; height:16px;"></i>
                            </button>
                        </div>
                        <div class="caps-lock-warning" id="caps-warning-reset-password">
                            <i data-lucide="alert-triangle" style="width:14px; height:14px; color:#e11d48; position:static; pointer-events:none;"></i> Caps Lock is ON
                        </div>
                        <div class="strength-meter-container" id="strength-reset-password" style="display: none;">
                            <div class="strength-text-label">
                                <span>Password Strength</span>
                                <span class="strength-label-text">Weak</span>
                            </div>
                            <div class="strength-bar-track">
                                <div class="strength-bar-fill"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 18px;">
                        <label for="reset-password-confirm">Confirm New Password</label>
                        <div class="input-with-icon">
                            <input type="password" id="reset-password-confirm" class="with-toggle" required placeholder="Repeat new password">
                            <i data-lucide="lock"></i>
                            <button type="button" class="btn-password-toggle" data-target="reset-password-confirm" title="Toggle Password Visibility">
                                <i data-lucide="eye" style="position:static; color:inherit; pointer-events:none; width:16px; height:16px;"></i>
                            </button>
                        </div>
                        <div class="caps-lock-warning" id="caps-warning-reset-password-confirm">
                            <i data-lucide="alert-triangle" style="width:14px; height:14px; color:#e11d48; position:static; pointer-events:none;"></i> Caps Lock is ON
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn" style="margin-top: 28px; width: 100%;">
                        Update Password & Log In <i data-lucide="save" style="width: 16px; height: 16px;"></i>
                    </button>
                </form>
            </div>
            
            <div class="login-footer">
                <a href="/" class="btn-text-sm" style="display: inline-flex; align-items: center; gap: 6px; color:#64748b; font-weight:500; text-decoration:none;"><i data-lucide="arrow-left" style="width:16px;"></i> Return to Landing</a>
            </div>
        </div>
    </div>

    <!-- Login JS Logic -->
    <script src="login.js"></script>
</body>
</html>
