<!-- Logo Container (Left) -->
<div class="logo-container" style="display: flex; align-items: center; width: auto;">
    <a href="/dashboard" class="logo-link">
        <img src="logo_light.png" alt="ThrustVault Logo" class="logo-image logo-light" style="height: 32px; width: auto;">
        <img src="logo_dark.png" alt="ThrustVault Logo" class="logo-image logo-dark" style="height: 32px; width: auto;">
    </a>
</div>

<!-- Navigation Links (Center) -->
<nav class="sidebar-nav" style="display: flex !important; align-items: center; gap: 15px; padding: 0; margin: 0 auto !important; flex: none !important; overflow: visible;">
    <div class="sidebar-menu-links" style="margin: 0; display: flex; flex-direction: row; gap: 10px; align-items: center;">
        <a href="/dashboard" class="btn-sidebar-link" title="Catalog View" style="text-decoration: none;">
            Catalog
        </a>
        <a href="/analytics" class="btn-sidebar-link" title="Test Runs" style="text-decoration: none;">
            Test Runs
        </a>
    </div>

    <!-- Catalog Dropdown (Thrust Levels) -->
    <div class="sidebar-dropdown-wrapper" style="position: relative; display: flex; align-items: center;">
        <a href="#" class="btn-sidebar-link" id="catalog-dropdown-toggle" style="margin: 0;">
            Thrust Levels
            <i data-lucide="chevron-down" class="dropdown-chevron" style="width: 14px; height: 14px;"></i>
        </a>
        <div class="category-list" id="category-list-container">
            <!-- Dynamic Categories will be injected here -->
        </div>
    </div>
</nav>

<!-- Right Side Actions (Right) -->
<div class="navbar-right" style="display: flex; align-items: center; gap: 20px;">
    <!-- Stats Widgets (kept hidden via display:none in CSS to satisfy JS selectors without cluttering navbar) -->
    <div class="sidebar-stats" style="display: none;">
        <span id="total-motors-count">0</span>
        <span id="total-categories-count">0</span>
    </div>

    <!-- User Profile Dropdown Card -->
    <div class="sidebar-footer" style="display: flex; align-items: center; margin: 0; padding: 0; border: none; background: transparent;">
        <div class="user-profile-menu-wrapper">
            <div class="user-avatar-trigger">
                <div class="user-avatar" id="user-avatar-initials">G</div>
                <i data-lucide="chevron-down" class="avatar-chevron"></i>
            </div>
            <div class="user-dropdown-card">
                <div class="dropdown-user-details">
                    <span class="user-email" id="session-email">guest@thrustvault.com</span>
                    <span class="badge-role role-guest">Guest</span>
                </div>
                <div class="dropdown-divider"></div>
                <!-- Logout Button (Theme Toggle will be dynamically prepended here by JS) -->
                <button class="btn-logout-premium" id="btn-logout" title="Log Out">
                    Log Out
                </button>
            </div>
        </div>
    </div>
</div>
