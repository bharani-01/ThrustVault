# render.yaml — Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml-spec
#
# NOTE: If you already created the service manually in the Render dashboard,
# go to Settings > Start Command and set it to:
#   gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
# (Render defaults to 'gunicorn app:app' which won't work — our file is server.py)

services:
  - type: web
    name: thrustvault
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free

    # Environment variables — set in the Render dashboard under Environment > Env Vars.
    # DO NOT commit your .env file — it is already in .gitignore.
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
