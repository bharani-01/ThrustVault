<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ThrustVault</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <!-- Ambient Blur Background Blobs -->
    <div class="login-bg-blob blob-1"></div>
    <div class="login-bg-blob blob-2"></div>

    <div class="login-container">
        <!-- Brand Logo/Header on top (outside the card or inside) -->
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <div class="login-logo-circle">
                        <i data-lucide="aperture" class="spin-slow" style="width:30px; height:30px; color:#2563eb;"></i>
                    </div>
                </div>
                <h2>Welcome to <span>ThrustVault</span></h2>
                <p>Sign in to access the UAV motor database console.</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-with-icon">
                        <input type="email" id="login-email" required placeholder="e.g. name@thrustvault.com">
                        <i data-lucide="mail"></i>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 18px;">
                    <label for="login-password">Password</label>
                    <div class="input-with-icon">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <i data-lucide="lock"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" style="margin-top: 28px; width: 100%;">
                    Sign In <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                </button>
            </form>
            
            <div class="login-footer">
                <a href="index.html" class="btn-text-sm" style="display: inline-flex; align-items: center; gap: 6px; color:#64748b; font-weight:500; text-decoration:none;"><i data-lucide="arrow-left" style="width:16px;"></i> Return to Landing</a>
            </div>
        </div>
        
        <!-- Premium Credentials Helper Grid -->
        <div class="credentials-helper">
            <h4><i data-lucide="key-round" style="color:#2563eb; width: 16px; height: 16px;"></i> Quick Demo Accounts</h4>
            <ul class="quick-credentials">
                <li class="admin-item" data-email="bharanisri73@gmail.com" data-pass="123456">
                    <div class="role-info">
                        <div class="role-icon-wrapper">
                            <i data-lucide="shield-alert" style="width:16px; height:16px;"></i>
                        </div>
                        <div>
                            <div class="role-label">Admin Profile</div>
                            <div class="user-email-text">bharanisri73@gmail.com</div>
                        </div>
                    </div>
                    <div class="autofill-action">
                        Use <i data-lucide="chevron-right" style="width:14px; height:14px;"></i>
                    </div>
                </li>
                <li class="intern-item" data-email="bharani.cyber@gmail.com" data-pass="123456">
                    <div class="role-info">
                        <div class="role-icon-wrapper">
                            <i data-lucide="edit-3" style="width:16px; height:16px;"></i>
                        </div>
                        <div>
                            <div class="role-label">Intern Profile</div>
                            <div class="user-email-text">bharani.cyber@gmail.com</div>
                        </div>
                    </div>
                    <div class="autofill-action">
                        Use <i data-lucide="chevron-right" style="width:14px; height:14px;"></i>
                    </div>
                </li>
                <li class="guest-item" data-email="e0224035@sriher.edu.in" data-pass="123456">
                    <div class="role-info">
                        <div class="role-icon-wrapper">
                            <i data-lucide="eye" style="width:16px; height:16px;"></i>
                        </div>
                        <div>
                            <div class="role-label">Guest Profile</div>
                            <div class="user-email-text">e0224035@sriher.edu.in</div>
                        </div>
                    </div>
                    <div class="autofill-action">
                        Use <i data-lucide="chevron-right" style="width:14px; height:14px;"></i>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <!-- Login JS Logic -->
    <script src="login.js"></script>
</body>
</html>
