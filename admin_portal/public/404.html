<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon_light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="favicon_dark.png" media="(prefers-color-scheme: dark)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - ThrustVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script src="/libs/lucide.min.js"></script>
    <style>
        :root {
            --bg-base: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: rgba(226, 232, 240, 0.8);
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --shadow-lg: 0 12px 28px -5px rgba(0,0,0,0.04), 0 8px 16px -6px rgba(0,0,0,0.02);
            --radius-lg: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Decorative background shapes */
        .decor-blur-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.08);
            filter: blur(80px);
            top: 10%;
            left: 10%;
            z-index: 1;
        }

        .decor-blur-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.08);
            filter: blur(100px);
            bottom: 10%;
            right: 10%;
            z-index: 1;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 480px;
            width: 100%;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 24px;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-home:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-home:active {
            transform: translateY(0);
        }
    </style>

<style id="admin-layout-override">
    /* ================================================================
       ADMIN PORTAL LAYOUT OVERRIDE — Horizontal Topbar Navigation
       The sidebar renders as a full-width horizontal topbar, not a
       280px left panel. app-container stacks vertically.
    ================================================================ */
    .app-container {
        flex-direction: column !important;
        height: 100vh !important;
        overflow: hidden !important;
    }
    .sidebar {
        width: 100% !important;
        height: auto !important;
        min-height: 60px !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border-color) !important;
        flex-direction: row !important;
        align-items: center !important;
        padding: 0 24px !important;
        background-color: rgba(255,255,255,0.95) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        box-shadow: 0 1px 4px rgba(15,23,42,0.06) !important;
        gap: 0 !important;
        flex-shrink: 0 !important;
        z-index: 100 !important;
        position: relative !important;
        box-sizing: border-box !important;
    }
    [data-theme=dark] .sidebar {
        background-color: rgba(15,23,42,0.95) !important;
        border-bottom-color: rgba(255,255,255,0.07) !important;
    }
    .sidebar .sidebar-skeleton-wrapper {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 16px !important;
        width: 100% !important;
        padding: 0 !important;
        height: 60px !important;
    }
    .main-content-wrapper {
        flex: 1 !important;
        min-height: 0 !important;
        display: flex !important;
        flex-direction: column !important;
    }
    .main-content {
        flex: 1 !important;
        min-height: 0 !important;
    }
    /* Nav link styles for horizontal bar */
    .sidebar .btn-sidebar-link {
        padding: 8px 14px !important;
        border-radius: var(--radius-md) !important;
        font-size: 0.875rem !important;
        font-weight: 500 !important;
        color: var(--text-secondary) !important;
        white-space: nowrap !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        transition: all 0.18s ease !important;
        text-decoration: none !important;
        background: transparent !important;
        border: none !important;
        cursor: pointer !important;
    }
    .sidebar .btn-sidebar-link:hover,
    .sidebar .btn-sidebar-link.active {
        background: rgba(37,99,235,0.08) !important;
        color: var(--primary-color) !important;
    }
    /* Dropdown items in horizontal nav */
    .sidebar .sidebar-dropdown-wrapper .category-list {
        display: none !important;
        position: absolute !important;
        top: calc(100% + 4px) !important;
        left: 0 !important;
        min-width: 200px !important;
        background: var(--bg-panel-solid) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius-md) !important;
        box-shadow: 0 8px 24px -4px rgba(15,23,42,0.12) !important;
        z-index: 9999 !important;
        padding: 6px !important;
        flex-direction: column !important;
        gap: 2px !important;
    }
    .sidebar .sidebar-dropdown-wrapper.expanded .category-list {
        display: flex !important;
    }
    .sidebar .sidebar-dropdown-wrapper .category-list .btn-sidebar-link {
        width: 100% !important;
        text-align: left !important;
        justify-content: flex-start !important;
        padding: 9px 14px !important;
    }
    /* User profile dropdown */
    .user-profile-menu-wrapper {
        position: relative !important;
        display: flex !important;
        align-items: center !important;
        margin-left: auto !important;
    }
    .user-avatar-trigger {
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
        cursor: pointer !important;
        padding: 4px 8px !important;
        border-radius: var(--radius-md) !important;
        transition: background 0.15s ease !important;
    }
    .user-avatar-trigger:hover { background: rgba(37,99,235,0.06) !important; }
    .user-dropdown-card {
        display: none !important;
        position: absolute !important;
        top: calc(100% + 8px) !important;
        right: 0 !important;
        min-width: 220px !important;
        background: var(--bg-panel-solid) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius-md) !important;
        box-shadow: 0 8px 24px -4px rgba(15,23,42,0.12) !important;
        z-index: 9999 !important;
        padding: 12px !important;
        flex-direction: column !important;
        gap: 10px !important;
    }
    .user-profile-menu-wrapper.open .user-dropdown-card { display: flex !important; }
    .dropdown-user-details { display: flex !important; flex-direction: column !important; gap: 4px !important; }
    .badge-role { font-size: 0.72rem !important; font-weight: 700 !important; padding: 2px 8px !important; border-radius: var(--radius-full) !important; display: inline-block !important; width: fit-content !important; }
    .role-admin { background: #dbeafe; color: #1d4ed8 !important; }
    .dropdown-divider { height: 1px; background: var(--border-color); margin: 4px 0; }
    .sidebar .sidebar-footer {
        border-top: none !important;
        background: transparent !important;
        padding: 0 !important;
        gap: 0 !important;
    }
    .avatar-chevron { width: 14px !important; height: 14px !important; color: var(--text-secondary) !important; transition: transform 0.2s ease !important; }
    .user-profile-menu-wrapper.open .avatar-chevron { transform: rotate(180deg) !important; }
    .sidebar .btn-logout-premium { width: 100% !important; padding: 8px 14px !important; font-size: 0.82rem !important; margin-top: 8px !important; }
    /* Sidebar nav dropdown wrappers need relative position for dropdown to work */
    .sidebar .sidebar-nav { overflow: visible !important; flex: none !important; }

</style>
</head>
<body>
    <div class="decor-blur-1"></div>
    <div class="decor-blur-2"></div>

    <div class="error-card">
        <div class="icon-container">
            <i data-lucide="shield-alert" style="width: 40px; height: 40px;"></i>
        </div>
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, is temporarily unavailable, or you do not have sufficient permissions to access it.</p>
        <a href="/" class="btn-home">
            <i data-lucide="home" style="width: 18px; height: 18px;"></i>
            Back to Safety
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
